<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lucky Charm</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffe6e6, #fff5f5);
        }
        .box {
            text-align: center;
            padding: 40px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #d6336c;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>You are my lucky charm 🌹</h1>
    </div>
</body>
</html>
